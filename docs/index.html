<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, noarchive, nosnippet">
    <meta http-equiv="cache-control" content="no-store">
    <title>Board Personnel Watch</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="offline-shell" aria-labelledby="pageTitle">
      <section class="offline-panel">
        <p class="eyebrow">Private Access</p>
        <h1 id="pageTitle">Board Personnel Watch is offline</h1>
        <p class="lead">
          This public deployment is intentionally closed while private access is being set up.
        </p>
        <div class="status-list" aria-label="Current access status">
          <div>
            <span>Site access</span>
            <strong>Restricted</strong>
          </div>
          <div>
            <span>App data</span>
            <strong>Not served here</strong>
          </div>
          <div>
            <span>Availability</span>
            <strong>Invite only</strong>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
